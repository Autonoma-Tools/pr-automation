name: Autonoma E2E

# Fire when the preview deployment finishes, so we only test a URL that actually exists.
on:
  deployment_status:

jobs:
  e2e:
    # Only run when the deployment succeeded and we have a preview URL to hit.
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Run Autonoma E2E suite against preview
        uses: autonoma-ai/actions/test-runner@v1
        with:
          api-key: ${{ secrets.AUTONOMA_API_KEY }}
          preview-url: ${{ github.event.deployment_status.environment_url }}

